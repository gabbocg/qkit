title: qkit
author: Gabriel Cabrera Guzmán
version: 0.1.0
contributes:
  formats:
    beamer:
      include-in-header:
        - beamer/preamble.tex
      template-partials:
        - beamer/title.tex
      pdf-engine: xelatex
      navigation: horizontal
      theme: default
      colortheme: default
      aspectratio: 43
      keep-tex: true
    pdf:
      include-in-header:
        - cv/preamble.tex
      template-partials:
        - cv/before-body.tex
      filters:
        - cv/filter.lua
      pdf-engine: lualatex
      geometry:
        - margin=0.70in
      fontfamily: mathpazo
      fontfamilyoptions:
        - sc
        - osf
      fontsize: 10pt
      linkcolor: blue
      urlcolor: blue
      keep-tex: true
